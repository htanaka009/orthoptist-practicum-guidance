<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>印刷用シート｜視能訓練士実習ナビ</title><link rel="stylesheet" href="assets/styles.css"></head><body><header><div class="wrap"><h1>印刷用シート</h1><p class="lead">紙提出・紙運用を前提にした記入用シートです。画面入力は保存されないため、必要に応じて印刷して使用してください。</p></div></header><nav class="no-print"><div class="nav-inner"><a class="button" href="index.html">ホーム</a><a class="button" href="endday.html">帰宅前整理</a><a class="button" href="correction.html">添削</a><a class="button" href="privacy.html">個人情報</a><a class="button primary" href="prints.html">印刷</a><a class="button" href="comments.html">コメント例</a><a class="button" href="matrix.html">困りごと</a></div></nav><main><section><h2>帰宅前整理シート</h2><p>今日の経験を、明日の観察・実技につなげるためのシートです。</p><div class="card white"><h3>1. 今日見たこと・行ったことを3つ</h3><div class="field"><label>1</label><textarea></textarea></div><div class="field"><label>2</label><textarea></textarea></div><div class="field"><label>3</label><textarea></textarea></div></div><div class="card white"><h3>2. 選んだ場面</h3><div class="field"><label>いちばん覚えている場面</label><textarea></textarea></div><div class="field"><label>その場面で気になったこと</label><textarea></textarea></div></div><div class="card green"><h3>3. 明日見ること</h3><div class="field"><label>明日、何を1つ意識して見ますか？</label><textarea></textarea></div></div><div class="card"><h3>4. 調べること</h3><div class="field"><label>明日見るために、帰宅後に何を1つ確認しますか？</label><textarea></textarea></div></div><div class="card"><h3>指導者メモ</h3><div class="field"><label>補足・確認事項</label><textarea></textarea></div></div><div class="print-actions"><button onclick="window.print()">このシートを印刷</button></div></section><section><h2>添削チェックシート</h2><p>提出レポートに直接書き込む前の確認用です。</p><div class="card white"><label class="check"><input type="checkbox">個人情報の見直しが必要</label><label class="check"><input type="checkbox">今日の具体的な場面を一つ足す</label><label class="check"><input type="checkbox">調べたことと今日の場面をつなげる</label><label class="check"><input type="checkbox">実技・患者対応の振り返りを一つ足す</label><label class="check"><input type="checkbox">明日見ること・次回意識することを一つ足す</label><label class="check"><input type="checkbox">文章構成を整える</label></div><div class="field"><label>コメント案</label><textarea placeholder="できている点 → 追加する一文 → 次に見ること"></textarea></div></section></main><footer><p>この資料は指導者用の補助資料です。入力内容は保存されません。</p></footer></body></html>
